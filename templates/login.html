<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ARMS Portal</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1e3c72, #2a5298);
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-blur: 10px;
      --primary: hsl(210, 100%, 55%);
      --radius: 12px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      width: 350px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: background 0.3s ease;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    input:focus {
      background: rgba(255, 255, 255, 0.35);
    }
    .toggle-visibility {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1.1rem;
    }
    button[type='submit'] {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button[type='submit']:hover {
      background: hsl(210, 100%, 45%);
    }
    .flash {
      background: rgba(255, 0, 0, 0.2);
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>ARMS Login</h2>
    {% with messages = get_flashed_messages(category_filter=["danger"]) %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="password" id="username" name="username" placeholder="Enter username" required />
        <button type="button" class="toggle-visibility" onclick="toggle('username')">👁️</button>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required />
        <button type="button" class="toggle-visibility" onclick="toggle('password')">👁️</button>
      </div>
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    function toggle(fieldId) {
      const field = document.getElementById(fieldId);
      if (field.type === 'password') {
        field.type = 'text';
      } else {
        field.type = 'password';
      }
    }
  </script>
</body>
</html>
